adapters:
  logger: console       # console (seule option disponible pour l'instant)

  repository: memory    # memory | mongodb | duckdb

  # mongodb:
  #   uri: mongodb://localhost:27017
  #   db_name: rekipe
  #   collection_name: ingredients

  # duckdb:
