[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kcrud"
version = "0.1.0"
description = "Generic async CRUD framework — domain, use cases, repositories, logger"
requires-python = "==3.12"
dependencies = [
    "pydantic==2.12",
    "pyyaml==6.0",
    "uuid6==2025.0",
    "loguru==0.7",
]

[project.optional-dependencies]
mongodb = ["motor==3.7"]
duckdb  = ["duckdb==1.5"]
fastapi = ["fastapi==0.135", "uvicorn==0.41"]
mcp     = ["fastmcp==3.1"]
all     = ["motor==3.7", "duckdb==1.5", "fastapi==0.135", "uvicorn==0.41", "fastmcp==3.1"]

[tool.hatch.build.targets.wheel]
packages = ["kcrud"]

